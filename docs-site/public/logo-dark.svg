  </defs>
  <rect width="512" height="160" fill="#0F172A" rx="28" />
  <rect width="128" height="128" x="16" y="16" fill="#020617" rx="24" />
  <rect width="128" height="128" x="16" y="16" fill="none" stroke="#1E293B" stroke-width="2" rx="24" />
  <path stroke="url(#meshGrad)" stroke-linejoin="round" stroke-width="4.5" d="M80 40 L45 105 L115 105 Z" />
  <path stroke="#06B6D4" stroke-linecap="round" stroke-width="4" d="M62.5 72.5 L97.5 72.5" />
  <path
    stroke="#4F46E5"
