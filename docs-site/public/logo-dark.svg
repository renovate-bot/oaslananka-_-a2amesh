  <circle cx="80" cy="40" r="6" fill="#FFF" filter="url(#nodeGlow)" />
  <circle cx="45" cy="105" r="5" fill="#06B6D4" filter="url(#nodeGlow)" />
  <circle cx="115" cy="105" r="5" fill="#06B6D4" filter="url(#nodeGlow)" />
  <circle cx="62.5" cy="72.5" r="4.5" fill="#FFF" />
  <circle cx="97.5" cy="72.5" r="4.5" fill="#FFF" />
  <circle cx="80" cy="85" r="7" fill="#4F46E5" filter="url(#nodeGlow)" />
