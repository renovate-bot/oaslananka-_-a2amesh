<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">A2A Mesh architecture overview</title>
  <desc id="desc">Runtime, registry, transports, adapters, MCP bridge, CLI, and UI relationships.</desc>
  <rect width="960" height="520" rx="28" fill="#0f172a"/>
  <text x="48" y="64" fill="#f8fafc" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="700">A2A Mesh architecture</text>
  <text x="48" y="96" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="15">Agent2Agent runtime, registry, transports, adapters, and operator surfaces</text>
  <g font-family="Inter,Arial,sans-serif" font-size="15">
    <rect x="48" y="140" width="180" height="78" rx="16" fill="#1e293b" stroke="#38bdf8"/>
    <text x="78" y="174" fill="#e0f2fe" font-weight="700">CLI / Scaffolder</text>
    <text x="78" y="199" fill="#bfdbfe">init, doctor, send</text>
    <rect x="390" y="130" width="220" height="96" rx="18" fill="#172554" stroke="#60a5fa"/>
    <text x="446" y="166" fill="#eff6ff" font-weight="700">A2A Runtime</text>
    <text x="430" y="193" fill="#bfdbfe">tasks, messages, artifacts</text>
    <rect x="706" y="140" width="180" height="78" rx="16" fill="#1e293b" stroke="#a78bfa"/>
    <text x="756" y="174" fill="#f5f3ff" font-weight="700">Registry</text>
    <text x="735" y="199" fill="#ddd6fe">cards, health, discovery</text>
    <rect x="110" y="300" width="180" height="78" rx="16" fill="#1e293b" stroke="#34d399"/>
    <text x="158" y="334" fill="#ecfdf5" font-weight="700">Adapters</text>
    <text x="133" y="359" fill="#bbf7d0">OpenAI, ADK, LangChain</text>
    <rect x="390" y="300" width="220" height="78" rx="16" fill="#1e293b" stroke="#fbbf24"/>
    <text x="451" y="334" fill="#fffbeb" font-weight="700">Transports</text>
    <text x="421" y="359" fill="#fde68a">HTTP/SSE, WebSocket, gRPC</text>
    <rect x="706" y="300" width="180" height="78" rx="16" fill="#1e293b" stroke="#fb7185"/>
    <text x="754" y="334" fill="#fff1f2" font-weight="700">MCP Bridge</text>
    <text x="732" y="359" fill="#fecdd3">request/response mapping</text>
    <rect x="390" y="420" width="220" height="56" rx="16" fill="#111827" stroke="#94a3b8"/>
    <text x="426" y="455" fill="#e5e7eb" font-weight="700">Registry UI / Playground</text>
  </g>
  <g stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)">
    <path d="M228 179 H390"/>
    <path d="M610 178 H706"/>
    <path d="M500 226 V300"/>
    <path d="M290 339 H390"/>
    <path d="M610 339 H706"/>
    <path d="M796 218 V300"/>
    <path d="M500 378 V420"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
