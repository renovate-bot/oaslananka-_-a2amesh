name: Interop Lab

'on':
  schedule:
    - cron: '21 2 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/interop-lab.yml'
      - 'scripts/run-interop-lab.mjs'
      - 'tests/interop/**'
      - 'docs/interop/**'
      - 'docs-site/interop/**'
      - 'package.json'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24.16.0'

jobs:
  official-sdk-fixtures:
    name: Interop Lab / official SDK fixtures
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm run interop:lab
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: interop-lab-report
          path: artifacts/interop-lab/report.json
          if-no-files-found: error
          retention-days: 14
