name: Containers

'on':
  pull_request:
    branches: [main]
    paths:
      - '.dockerignore'
      - '.github/workflows/containers.yml'
      - 'apps/demo/**'
      - 'packages/**'
      - 'scripts/check-container-*.mjs'
      - 'scripts/prune-container-deploy.mjs'
      - 'scripts/run-container-smoke.mjs'
      - 'compose.dev.yaml'
      - 'deploy/compose.production.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  push:
    branches: [main]
    paths:
      - '.dockerignore'
      - '.github/workflows/containers.yml'
      - 'apps/demo/**'
      - 'packages/**'
      - 'scripts/check-container-*.mjs'
      - 'scripts/prune-container-deploy.mjs'
      - 'scripts/run-container-smoke.mjs'
      - 'compose.dev.yaml'
      - 'deploy/compose.production.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Runtime release tag to publish, for example @a2amesh/runtime-v0.11.0-alpha.1'
        required: false
        type: string
      confirmation:
        description: 'Type PUBLISH CONTAINERS <tag> to confirm GHCR publication'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TRIVY_IMAGE: aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f

jobs:
  validate:
    name: Containers / config
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - run: node scripts/check-container-config.mjs

  build-smoke:
    name: Containers / ${{ matrix.component }}
    needs: [validate]
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: runtime
            dockerfile: apps/demo/Dockerfile
          - component: registry
            dockerfile: packages/registry/Dockerfile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Initialize BuildKit builder
        run: |
          set -euo pipefail
          docker buildx create --name a2amesh-builder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Build local image
        env:
          COMPONENT: ${{ matrix.component }}
          DOCKERFILE: ${{ matrix.dockerfile }}
        run: |
          set -euo pipefail
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          image="local/a2amesh-${COMPONENT}:${GITHUB_SHA}"
          echo "IMAGE=${image}" >> "$GITHUB_ENV"
          echo "CREATED=${created}" >> "$GITHUB_ENV"
          docker buildx build \
            --builder a2amesh-builder \
            --platform linux/amd64 \
            --file "${DOCKERFILE}" \
            --tag "${image}" \
            --build-arg VERSION=0.0.0-ci \
            --build-arg REVISION="${GITHUB_SHA}" \
            --build-arg CREATED="${created}" \
            --provenance=false \
            --sbom=false \
            --load \
            .

      - name: Inspect image runtime surface
        env:
          COMPONENT: ${{ matrix.component }}
        run: |
          set -euo pipefail
          test "$(docker image inspect --format '{{.Config.User}}' "${IMAGE}")" = '10001:10001'
          test "$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.version" }}' "${IMAGE}")" = '0.0.0-ci'
          test "$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "${IMAGE}")" = "${GITHUB_SHA}"
          test "$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.created" }}' "${IMAGE}")" = "${CREATED}"

          container_id="$(docker create "${IMAGE}")"
          trap 'docker rm --force "${container_id}" >/dev/null 2>&1 || true' EXIT
          docker export "${container_id}" | tar -tf - > "${RUNNER_TEMP}/${COMPONENT}-files.txt"
          if grep -Eq '^(workspace/|app/(src/|[^/]+\.(ts|tsx|mts|cts)$|.*\.(d\.ts|map|tsbuildinfo)$|tsconfig|pnpm-lock\.yaml|pnpm-workspace\.yaml|node_modules/\.cache/)|root/\.local/share/pnpm/|opt/yarn-v|usr/local/(bin/(npm|npx|corepack|yarn|yarnpkg)|lib/node_modules/(npm|corepack))/)' "${RUNNER_TEMP}/${COMPONENT}-files.txt"; then
            echo 'Final image contains source, build metadata, or package-manager cache:'
            grep -E '^(workspace/|app/(src/|[^/]+\.(ts|tsx|mts|cts)$|.*\.(d\.ts|map|tsbuildinfo)$|tsconfig|pnpm-lock\.yaml|pnpm-workspace\.yaml|node_modules/\.cache/)|root/\.local/share/pnpm/|opt/yarn-v|usr/local/(bin/(npm|npx|corepack|yarn|yarnpkg)|lib/node_modules/(npm|corepack))/)' "${RUNNER_TEMP}/${COMPONENT}-files.txt" | head -100
            exit 1
          fi

      - name: Run non-root read-only startup smoke
        env:
          COMPONENT: ${{ matrix.component }}
        run: node scripts/run-container-smoke.mjs "${COMPONENT}" "${IMAGE}"

      - name: Scan Dockerfile configuration
        env:
          DOCKERFILE: ${{ matrix.dockerfile }}
        run: |
          set -euo pipefail
          docker run --rm \
            --volume "${GITHUB_WORKSPACE}:/work:ro" \
            --workdir /work \
            "${TRIVY_IMAGE}" config \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            "${DOCKERFILE}"

      - name: Scan image vulnerabilities
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/trivy-cache"
          docker run --rm \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            --volume "${RUNNER_TEMP}/trivy-cache:/root/.cache/trivy" \
            "${TRIVY_IMAGE}" image \
            --scanners vuln \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --no-progress \
            "${IMAGE}"

      - name: Verify OCI SBOM and provenance attestations
        env:
          COMPONENT: ${{ matrix.component }}
          DOCKERFILE: ${{ matrix.dockerfile }}
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/${COMPONENT}.oci.tar"
          layout="${RUNNER_TEMP}/${COMPONENT}-oci"
          docker buildx build \
            --builder a2amesh-builder \
            --platform linux/amd64 \
            --file "${DOCKERFILE}" \
            --build-arg VERSION=0.0.0-ci \
            --build-arg REVISION="${GITHUB_SHA}" \
            --build-arg CREATED="${CREATED}" \
            --provenance=mode=max \
            --sbom=true \
            --output "type=oci,dest=${archive}" \
            .
          mkdir -p "${layout}"
          tar -xf "${archive}" -C "${layout}"
          (cd "${RUNNER_TEMP}" && node "${GITHUB_WORKSPACE}/scripts/check-oci-attestations.mjs" "${COMPONENT}")

      - name: Remove BuildKit builder
        if: ${{ always() }}
        run: docker buildx rm --force a2amesh-builder || true

  publish:
    name: Containers / publish GHCR
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
    needs: [build-smoke]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment: container-publish
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Validate publication confirmation
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          if [[ ! "${INPUT_TAG}" =~ ^@a2amesh/runtime-v([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?)$ ]]; then
            echo "Invalid runtime release tag: ${INPUT_TAG}"
            exit 1
          fi
          if [[ "${INPUT_CONFIRMATION}" != "PUBLISH CONTAINERS ${INPUT_TAG}" ]]; then
            echo "Confirmation must exactly match: PUBLISH CONTAINERS ${INPUT_TAG}"
            exit 1
          fi
          echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.tag }}

      - name: Resolve immutable release metadata
        id: metadata
        run: |
          set -euo pipefail
          revision="$(git rev-parse HEAD)"
          created="$(git show -s --format=%cI HEAD)"
          {
            echo "revision=${revision}"
            echo "created=${created}"
            echo "runtime_ref=ghcr.io/oaslananka/a2amesh-runtime"
            echo "registry_ref=ghcr.io/oaslananka/a2amesh-registry"
          } >> "$GITHUB_OUTPUT"

      - name: Initialize BuildKit builder and authenticate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          docker buildx create --name a2amesh-publisher --driver docker-container --use
          docker buildx inspect --bootstrap
          echo "${GH_TOKEN}" | docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Build and scan release images before push
        env:
          VERSION: ${{ steps.release.outputs.version }}
          REVISION: ${{ steps.metadata.outputs.revision }}
          CREATED: ${{ steps.metadata.outputs.created }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/trivy-cache"
          for spec in 'runtime apps/demo/Dockerfile' 'registry packages/registry/Dockerfile'; do
            read -r component dockerfile <<< "${spec}"
            image="local/a2amesh-${component}:${REVISION}"
            docker buildx build \
              --builder a2amesh-publisher \
              --platform linux/amd64 \
              --file "${dockerfile}" \
              --tag "${image}" \
              --build-arg VERSION="${VERSION}" \
              --build-arg REVISION="${REVISION}" \
              --build-arg CREATED="${CREATED}" \
              --provenance=false \
              --sbom=false \
              --load \
              .
            node scripts/run-container-smoke.mjs "${component}" "${image}"
            docker run --rm \
              --volume /var/run/docker.sock:/var/run/docker.sock \
              --volume "${RUNNER_TEMP}/trivy-cache:/root/.cache/trivy" \
              "${TRIVY_IMAGE}" image \
              --scanners vuln \
              --exit-code 1 \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --no-progress \
              "${image}"
          done

      - name: Publish runtime image
        id: runtime
        env:
          IMAGE_REF: ${{ steps.metadata.outputs.runtime_ref }}
          VERSION: ${{ steps.release.outputs.version }}
          REVISION: ${{ steps.metadata.outputs.revision }}
          CREATED: ${{ steps.metadata.outputs.created }}
        run: |
          set -euo pipefail
          metadata_file="${RUNNER_TEMP}/runtime-metadata.json"
          docker buildx build \
            --builder a2amesh-publisher \
            --platform linux/amd64 \
            --file apps/demo/Dockerfile \
            --tag "${IMAGE_REF}:${VERSION}" \
            --tag "${IMAGE_REF}:sha-${REVISION}" \
            --build-arg VERSION="${VERSION}" \
            --build-arg REVISION="${REVISION}" \
            --build-arg CREATED="${CREATED}" \
            --provenance=mode=max \
            --sbom=true \
            --metadata-file "${metadata_file}" \
            --push \
            .
          digest="$(node -e "const m=require(process.argv[1]); process.stdout.write(m['containerimage.digest']);" "${metadata_file}")"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Publish registry image
        id: registry
        env:
          IMAGE_REF: ${{ steps.metadata.outputs.registry_ref }}
          VERSION: ${{ steps.release.outputs.version }}
          REVISION: ${{ steps.metadata.outputs.revision }}
          CREATED: ${{ steps.metadata.outputs.created }}
        run: |
          set -euo pipefail
          metadata_file="${RUNNER_TEMP}/registry-metadata.json"
          docker buildx build \
            --builder a2amesh-publisher \
            --platform linux/amd64 \
            --file packages/registry/Dockerfile \
            --tag "${IMAGE_REF}:${VERSION}" \
            --tag "${IMAGE_REF}:sha-${REVISION}" \
            --build-arg VERSION="${VERSION}" \
            --build-arg REVISION="${REVISION}" \
            --build-arg CREATED="${CREATED}" \
            --provenance=mode=max \
            --sbom=true \
            --metadata-file "${metadata_file}" \
            --push \
            .
          digest="$(node -e "const m=require(process.argv[1]); process.stdout.write(m['containerimage.digest']);" "${metadata_file}")"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Attest runtime image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-name: ${{ steps.metadata.outputs.runtime_ref }}
          subject-digest: ${{ steps.runtime.outputs.digest }}
          push-to-registry: true

      - name: Attest registry image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-name: ${{ steps.metadata.outputs.registry_ref }}
          subject-digest: ${{ steps.registry.outputs.digest }}
          push-to-registry: true

      - name: Verify immutable image digests
        env:
          RUNTIME_REF: ${{ steps.metadata.outputs.runtime_ref }}
          RUNTIME_DIGEST: ${{ steps.runtime.outputs.digest }}
          REGISTRY_REF: ${{ steps.metadata.outputs.registry_ref }}
          REGISTRY_DIGEST: ${{ steps.registry.outputs.digest }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${RUNTIME_REF}@${RUNTIME_DIGEST}"
          docker buildx imagetools inspect "${REGISTRY_REF}@${REGISTRY_DIGEST}"
          {
            echo '## Published container images'
            echo
            echo "- Runtime: \`${RUNTIME_REF}@${RUNTIME_DIGEST}\`"
            echo "- Registry: \`${REGISTRY_REF}@${REGISTRY_DIGEST}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove BuildKit builder
        if: ${{ always() }}
        run: docker buildx rm --force a2amesh-publisher || true
