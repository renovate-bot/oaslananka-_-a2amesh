name: Bug Report
description: Found something broken? Let us know.
labels: ['bug', 'triage']
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - '@a2amesh/runtime'
        - '@a2amesh/internal-adapter-anthropic'
        - '@a2amesh/internal-adapter-base'
        - '@a2amesh/internal-adapter-crewai'
        - '@a2amesh/internal-adapter-google-adk'
        - '@a2amesh/internal-adapter-langchain'
        - '@a2amesh/internal-adapter-llamaindex'
        - '@a2amesh/internal-adapter-openai'
        - '@a2amesh/internal-adapters'
        - '@a2amesh/mcp'
        - '@a2amesh/cli'
        - '@a2amesh/protocol'
        - '@a2amesh/registry'
        - '@a2amesh/protocol'
        - '@a2amesh/internal-transport-grpc'
        - '@a2amesh/internal-transport-ws'
        - 'create-a2amesh'
        - 'Other'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: 'e.g. 1.0.2'
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A minimal TypeScript snippet or repo link
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: dropdown
    id: node-version
    attributes:
      label: Node.js version
      options: ['22', '24', 'Other']
