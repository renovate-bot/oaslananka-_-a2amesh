name: Security Hardening
description: Request a defensive improvement that is not a vulnerability report.
labels: ['security', 'hardening', 'triage']
body:
  - type: markdown
    attributes:
      value: Use private security advisories for suspected vulnerabilities.
  - type: textarea
    id: control
    attributes:
      label: Control or behavior
      description: Describe the defensive behavior that should change.
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risk reduced
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Suggested verification
